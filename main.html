<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <link rel="stylesheet" href="/style/style.css">
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- duisay ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <div class="navbar w-11/12 mx-auto">
            <div class="navbar bg-base-100 shadow-sm flex justify-between">
                <div class="flex gap-2 font-medium">
                    <!-- <a class="btn btn-ghost text-xl">daisyUI</a> -->
                     <p><img src="./assets/github-thumb.png" alt=""></p>
                     <p>GitHub Issues Tracker</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <button class="btn btn-primary"><span class="text-2xl">+</span>New Issue</button>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
