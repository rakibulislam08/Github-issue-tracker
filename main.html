<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <link rel="stylesheet" href="/style/style.css">
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- duisay ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="navbar bg-base-100 shadow-sm flex justify-between">
                    <div class="flex gap-2 font-medium">
                        <!-- <a class="btn btn-ghost text-xl">daisyUI</a> -->
                        <p><img src="./assets/github-thumb.png" alt=""></p>
                        <p>GitHub Issues Tracker</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                        <button class="btn btn-primary"><span class="text-2xl">+</span>New Issue</button>
                    </div>
                </div>
            </div>
        </nav>

        <section class="w-[90%] mx-auto shadow mt-10 px-10 py-5 rounded">
            <button id="all-btn" class="btn text-white bg-[#4A00FF]  px-6 btn-outline">ALL</button>
            <button id="openBtn"
                class="btn text-[#64748B] bg-white hover:text-white hover:bg-[#4A00FF]  px-6 btn-outline">Open</button>
            <button id="closedBtn"
                class="btn text-[#64748B] bg-white hover:text-white hover:bg-[#4A00FF]  px-6 btn-outline">Closed</button>
        </section>
    </header>
    <!-- main  -->
    <main class="w-[90%] mx-auto mt-15 shadow-sm px-4 pb-4">
        <div class="flex justify-between items-center shadow-sm p-5 rounded">
            <div class="flex gap-x-5">
                <div>
                    <p><img src="./assets/Group 1.png" alt=""></p>
                </div>
                <div class="">
                    <p class="font-semibold">50 Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2">
                <p>Open</p>
                <p>Closed</p>
            </div>
            <!-- <div class="divide"></div> -->

        </div>
        <!-- card section  -->
        <section>
            <div id="cardsContainer" class=" sm:grid-cols-1 
            grid lg:grid-cols-4 gap-5 mt-15 mb-5 ">


                <!-- <span id="allLoading" class="loading loading-spinner loading-lg"></span> -->
            </div>
        </section>

       
        <script src="js/app.js"></script>
</body>

</html>
