<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <link rel="stylesheet" href="/style/style.css">
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- duisay ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <section>
        <div class="hero bg-base-200 min-h-screen">
        <div class="hero-content lg:flex-row-reverse">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                <div class="card-body">

                    <div class="text-center lg:text-left my-5 ">
                        <img class="w-30 h-30 mx-auto py-2" src="./assets/github-thumb.png" alt="">
                        <p class="text-2xl text-center font-medium py-2">GitHub Issues Tracker</p>
                        <p class="py-2 text-center text-[#64748B]">
                            Sign in to manage your issues
                        </p>
                    </div>
                    <div class="shadow p-3">
                        <fieldset class="fieldset">
                            <label class="label">Your Name</label>
                            <input  id="user-name" type="Your Name" class="input" 
                            placeholder="Enter UserName" required />
                            <label class="label">Password</label>
                            <input id="password" type="password" class="input" placeholder="Enter Your Password" required/>
                            <div><a class="link link-hover">Forgot password?</a></div>
                            <button id="login-btn"  onclick="logIn()" class="btn btn-primary mt-4">Login</button>
                        </fieldset>
                    </div>

                </div>
            </div>
        </div>
    </div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
